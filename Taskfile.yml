version: "3"

vars:
  LOCAL_ROOT: .task
  LOCAL_BIN: .task/bin
  LOCAL_GOPATH: .task/gopath
  LOCAL_GOCACHE: .task/gocache
  LOCAL_GOMODCACHE: .task/gomodcache
  GOLANGCI_LINT_VERSION: latest
  GOVULNCHECK_VERSION: latest

env:
  GOBIN: "{{.TASKFILE_DIR}}/{{.LOCAL_BIN}}"
  GOPATH: "{{.TASKFILE_DIR}}/{{.LOCAL_GOPATH}}"
  GOCACHE: "{{.TASKFILE_DIR}}/{{.LOCAL_GOCACHE}}"
  GOMODCACHE: "{{.TASKFILE_DIR}}/{{.LOCAL_GOMODCACHE}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w cmd internal

  fmt:check:
    desc: Check Go formatting
    cmds:
      - |
        unformatted="$(gofmt -l cmd internal)"
        if [ -n "${unformatted}" ]; then
          echo "The following files are not gofmt-formatted:"
          echo "${unformatted}"
          exit 1
        fi

  tidy:
    desc: Tidy Go module dependencies
    deps:
      - bootstrap
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet checks
    deps:
      - bootstrap
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    cmds:
      - task test:coverage
      - task test:e2e

  test:e2e:
    desc: Black-box CLI end-to-end tests (builds retrieval-client, runs via exec)
    deps:
      - bootstrap
    cmds:
      - go test -v -count=1 ./test/e2e/retrievalclient/...

  test:e2e:stack:
    desc: Local stack E2E (docker nginx + sp-proxy + retrieval-client; optional Calibration keys)
    deps:
      - bootstrap
    cmds:
      - go test -v -tags=e2e_stack -count=1 -timeout=15m ./test/e2e/stack/...

  test:e2e:stack:calibration:
    desc: Stack E2E paid fetch on Filecoin Calibration (requires funded keys under test/e2e/.keys)
    deps:
      - bootstrap
    env:
      E2E_CALIBRATION: "1"
    cmds:
      - go test -v -tags=e2e_stack -count=1 -timeout=25m -run 'TestStack_Calibration' ./test/e2e/stack/...

  test:coverage:
    desc: Run unit tests and write coverage report (excludes test/e2e; run task test:e2e separately)
    deps:
      - bootstrap
    cmds:
      - |
        set -euo pipefail
        mkdir -p .task
        pkgs="$(go list ./... | grep -v '/test/e2e' || true)"
        if [[ -z "${pkgs}" ]]; then
          echo "no packages for coverage" >&2
          exit 1
        fi
        # shellcheck disable=SC2086
        if ! go test -coverprofile=coverage.out ${pkgs} > .task/coverage-test.log 2>&1; then
          cat .task/coverage-test.log
          exit 1
        fi
        bash scripts/coverage-summary.sh coverage.out .task/coverage-test.log
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run golangci-lint
    deps:
      - tools
    cmds:
      - "{{.LOCAL_BIN}}/golangci-lint run"

  build:
    desc: Build project binaries
    deps:
      - bootstrap
    cmds:
      - mkdir -p bin
      - go build -o bin/ ./cmd/retrieval-client ./cmd/sp-proxy

  vuln:
    desc: Run vulnerability checks (excludes test/e2e helper packages)
    deps:
      - tools
    cmds:
      - |
        set -euo pipefail
        pkgs="$(go list ./... | grep -v '/test/e2e' || true)"
        if [[ -z "${pkgs}" ]]; then
          echo "no packages for vuln check" >&2
          exit 1
        fi
        # shellcheck disable=SC2086
        {{.LOCAL_BIN}}/govulncheck ${pkgs}

  ci:
    desc: Run local CI checks
    cmds:
      - task fmt:check
      - task vet
      - task test
      - task lint
      - task build
      - task vuln

  bootstrap:
    desc: Create local directories for a self-contained toolchain cache
    cmds:
      - mkdir -p "{{.LOCAL_BIN}}" "{{.LOCAL_GOPATH}}" "{{.LOCAL_GOCACHE}}" "{{.LOCAL_GOMODCACHE}}"

  tools:
    desc: Install required developer tools locally under .task/bin
    run: once
    deps:
      - bootstrap
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}}

  clean:
    desc: Remove build outputs
    cmds:
      - rm -rf bin "{{.LOCAL_ROOT}}"

  nginx:piece:
    desc: Start stock nginx serving an 8 GiB sparse dummy file under /piece/<cid>
    cmds:
      - mkdir -p .task/nginx-piece/piece
      - truncate -s 32G .task/nginx-piece/piece/data.car
      - |
        cat > .task/nginx-piece/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;

          location ~ ^/piece/ {
            default_type application/octet-stream;
            try_files /piece/data.car =404;
          }
        }
        EOF
      - docker rm -f paid-retrievals-nginx-piece >/dev/null 2>&1 || true
      - |
        docker run -d --name paid-retrievals-nginx-piece -p 8788:80 \
          -v "{{.TASKFILE_DIR}}/.task/nginx-piece/piece:/usr/share/nginx/html/piece:ro" \
          -v "{{.TASKFILE_DIR}}/.task/nginx-piece/default.conf:/etc/nginx/conf.d/default.conf:ro" \
          nginx:stable-alpine
      - echo "nginx started at http://127.0.0.1:8788/piece/<cid> (8 GiB sparse zeros, Content-Length 8589934592)"

  nginx:piece:clean:
    desc: Stop nginx piece container and remove local dummy data
    cmds:
      - docker rm -f paid-retrievals-nginx-piece >/dev/null 2>&1 || true
      - rm -rf .task/nginx-piece
      - echo "nginx piece container stopped and .task/nginx-piece removed"
