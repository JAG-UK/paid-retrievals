version: "3"

vars:
  LOCAL_ROOT: .task
  LOCAL_BIN: .task/bin
  LOCAL_GOPATH: .task/gopath
  LOCAL_GOCACHE: .task/gocache
  LOCAL_GOMODCACHE: .task/gomodcache
  GOLANGCI_LINT_VERSION: latest
  GOVULNCHECK_VERSION: latest

env:
  GOBIN: "{{.TASKFILE_DIR}}/{{.LOCAL_BIN}}"
  GOPATH: "{{.TASKFILE_DIR}}/{{.LOCAL_GOPATH}}"
  GOCACHE: "{{.TASKFILE_DIR}}/{{.LOCAL_GOCACHE}}"
  GOMODCACHE: "{{.TASKFILE_DIR}}/{{.LOCAL_GOMODCACHE}}"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  fmt:
    desc: Format all Go files
    cmds:
      - gofmt -w cmd internal

  fmt:check:
    desc: Check Go formatting
    cmds:
      - |
        unformatted="$(gofmt -l cmd internal)"
        if [ -n "${unformatted}" ]; then
          echo "The following files are not gofmt-formatted:"
          echo "${unformatted}"
          exit 1
        fi

  tidy:
    desc: Tidy Go module dependencies
    deps:
      - bootstrap
    cmds:
      - go mod tidy

  vet:
    desc: Run go vet checks
    deps:
      - bootstrap
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    deps:
      - bootstrap
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    deps:
      - tools
    cmds:
      - "{{.LOCAL_BIN}}/golangci-lint run"

  build:
    desc: Build project binaries
    deps:
      - bootstrap
    cmds:
      - mkdir -p bin
      - go build -o bin/ ./cmd/retrieval-client ./cmd/sp-proxy

  vuln:
    desc: Run vulnerability checks
    deps:
      - tools
    cmds:
      - "{{.LOCAL_BIN}}/govulncheck ./..."

  ci:
    desc: Run local CI checks
    cmds:
      - task fmt:check
      - task vet
      - task test
      - task lint
      - task build
      - task vuln

  bootstrap:
    desc: Create local directories for a self-contained toolchain cache
    cmds:
      - mkdir -p "{{.LOCAL_BIN}}" "{{.LOCAL_GOPATH}}" "{{.LOCAL_GOCACHE}}" "{{.LOCAL_GOMODCACHE}}"

  tools:
    desc: Install required developer tools locally under .task/bin
    run: once
    deps:
      - bootstrap
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}}

  clean:
    desc: Remove build outputs
    cmds:
      - rm -rf bin "{{.LOCAL_ROOT}}"

  nginx:piece:
    desc: Start nginx container serving a dummy file under /piece
    cmds:
      - mkdir -p .task/nginx-piece/piece
      - printf "DUMMY-CAR\nCID=bafydummy\n" > .task/nginx-piece/piece/index.html
      - |
        cat > .task/nginx-piece/default.conf <<'EOF'
        server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;

          location /piece/ {
            try_files $uri /piece/index.html;
          }
        }
        EOF
      - docker rm -f paid-retrievals-nginx-piece >/dev/null 2>&1 || true
      - docker run -d --name paid-retrievals-nginx-piece -p 8788:80 -v "{{.TASKFILE_DIR}}/.task/nginx-piece:/usr/share/nginx/html:ro" -v "{{.TASKFILE_DIR}}/.task/nginx-piece/default.conf:/etc/nginx/conf.d/default.conf:ro" nginx:stable-alpine
      - echo "nginx started at http://127.0.0.1:8788/piece/"

  nginx:piece:clean:
    desc: Stop/remove nginx piece container and delete nginx image
    cmds:
      - docker rm -f paid-retrievals-nginx-piece >/dev/null 2>&1 || true
      - docker rmi nginx:stable-alpine >/dev/null 2>&1 || true
      - echo "nginx piece container stopped and image removed (if present)"

  operator:bootstrap:
    desc: Bootstrap operator environment
    cmds:
      - git submodule update --init --recursive

  operator:build:
    desc: Build operator binary
    dir: operator
    cmds:
    - forge build

  # When working on calibration best development flow is to deploy new contracts every time
  # we change the contracts.
  # When we move to mainnet we will upgrade existing contracts.
  operator:deploy:calibnet:
    desc: Deploy operator to Calibnet
    dir: operator
    cmds:
    - just calibnet_deploy

  operator:deploy:create:
    desc: Create operator factory and operator beacon
    dir: operator
    env:
      RPC_URL: https://api.calibration.node.glif.io/rpc/v1
      # get this from the deployment artifact
      CREATE_CONTRACT_ADDRESS: 0xD874D329a70FE5383f765FE9528D90f94915aCC9
      # the key used to deploy the operator factory
      PRIVATE_KEY: 0x16eb8fc4b66e8c509cd54f89f8479429743ce757ef853497457c84d1c40507a2
    cmds:
    - cast send --rpc-url $RPC_URL $CREATE_CONTRACT_ADDRESS "create()" --private-key $PRIVATE_KEY
